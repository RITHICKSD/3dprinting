<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | 3DPrint Pro</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        html,
        body {
            overflow-x: hidden !important;
            max-width: 100% !important;
        }

        * {
            box-sizing: border-box;
            min-width: 0;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #f43f5e;
            --primary-glow: rgba(244, 63, 94, 0.15);
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --sidebar-w: 280px;
            --header-h: 72px;
            --bg-main: #020617;
            --bg-card: #0f172a;
            --bg-sidebar: #0b1120;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 20px;
        }

        [data-theme="light"] {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            min-width: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            transition: background 0.3s;
        }

        /* ── Sidebar ── */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 200;
            transition: var(--transition);
        }

        @media (max-width: 1000px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
                box-shadow: 10px 0 50px rgba(0, 0, 0, 0.3);
            }
        }

        .sidebar-logo {
            padding: 30px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-box {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .logo-text {
            font-family: 'Outfit';
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--text-main);
        }

        .nav-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            opacity: 0.6;
            padding: 20px 24px 10px;
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 4px;
            transition: var(--transition);
        }

        .nav-item i {
            font-size: 1rem;
            width: 24px;
            text-align: center;
        }

        .nav-item:hover,
        .nav-item.active {
            background: var(--primary-glow);
            color: var(--primary);
        }

        .nav-item.active {
            background: linear-gradient(90deg, var(--primary-glow), transparent);
            border-left: 4px solid var(--primary);
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .foot-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .foot-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ── Header ── */
        .main {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            position: relative;
        }

        @media (max-width: 1000px) {
            .main {
                margin-left: 0;
            }
        }

        header {
            height: var(--header-h);
            background: rgba(var(--bg-main), 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-main);
            cursor: pointer;
        }

        @media (max-width: 1000px) {
            .hamburger {
                display: block;
            }
        }

        /* ── Content ── */
        .content {
            padding: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .stat-val {
            font-family: 'Outfit';
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
        }

        @media (max-width: 600px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .chart-title {
            font-family: 'Outfit';
            font-weight: 700;
            font-size: 1rem;
        }

        .chart-wrapper {
            height: 260px;
            position: relative;
        }

        /* Admin RTL Overrides */
        [dir="rtl"] {
            text-align: right;
        }

        [dir="rtl"] .sidebar {
            left: auto;
            right: 0;
            border-right: none;
            border-left: 1px solid var(--border);
        }

        [dir="rtl"] .main {
            margin-left: 0;
            margin-right: var(--sidebar-w);
        }

        [dir="rtl"] header {
            flex-direction: row-reverse;
        }

        [dir="rtl"] .nav-item {
            text-align: right;
            flex-direction: row-reverse;
        }

        [dir="rtl"] .nav-item.active {
            border-left: none;
            border-right: 4px solid var(--primary);
            background: linear-gradient(270deg, var(--primary-glow), transparent);
        }

        @media (max-width: 1000px) {
            [dir="rtl"] .sidebar {
                transform: translateX(100%);
            }

            [dir="rtl"] .sidebar.open {
                transform: translateX(0);
            }

            [dir="rtl"] .main {
                margin-right: 0;
            }
        }


        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 150;
            display: none;
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <a href="index.html" class="sidebar-logo">
            <img src="logo.png" alt="3DPrint Pro Logo"
                style="height: 55px; width: auto; display: block; margin: 0 auto;">
        </a>

        <div class="nav-list">
            <span class="nav-label">System Dashboard</span>
            <a href="#" class="nav-item active"><i class="fas fa-th-large"></i> Overview</a>
            <a href="#" class="nav-item"><i class="fas fa-users"></i> User Management</a>
            <a href="#" class="nav-item"><i class="fas fa-shopping-cart"></i> Global Orders</a>

            <span class="nav-label">Resources</span>
            <a href="#" class="nav-item"><i class="fas fa-box"></i> Inventory</a>
            <a href="#" class="nav-item"><i class="fas fa-tools"></i> Maintenance</a>

            <span class="nav-label">Analytics</span>
            <a href="#" class="nav-item"><i class="fas fa-chart-line"></i> Revenue</a>
            <a href="#" class="nav-item"><i class="fas fa-shield-alt"></i> Security Logs</a>
        </div>

        <div class="sidebar-footer">
            <button class="foot-btn" onclick="toggleTheme()" title="Toggle Theme"><i class="fas fa-moon"></i></button>
            <button class="foot-btn" onclick="toggleDir()" title="Toggle Direction"><i
                    class="fas fa-globe"></i></button>
        </div>
    </aside>

    <main class="main">
        <header>
            <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.2rem;">System Overview</div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <i class="fas fa-search" style="color: var(--text-muted);"></i>
                <i class="fas fa-bell" style="color: var(--text-muted); position: relative;">
                    <span
                        style="position: absolute; top: -5px; right: -5px; width: 8px; height: 8px; background: var(--primary); border-radius: 50%;"></span>
                </i>
                <div
                    style="width: 36px; height: 36px; border-radius: 50%; background: #2dd4bf; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; color: #0f172a;">
                    SK</div>
            </div>
        </header>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(16,185,129,0.1); color: var(--success);"><i
                            class="fas fa-dollar-sign"></i></div>
                    <div>
                        <div class="stat-val">$248,500</div>
                        <div class="stat-label">Total Revenue</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(244,63,94,0.1); color: var(--primary);"><i
                            class="fas fa-users"></i></div>
                    <div>
                        <div class="stat-val">12,482</div>
                        <div class="stat-label">Active Users</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(6,182,212,0.1); color: var(--accent);"><i
                            class="fas fa-cog"></i></div>
                    <div>
                        <div class="stat-val">99.8%</div>
                        <div class="stat-label">System Health</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(245,158,11,0.1); color: var(--warning);"><i
                            class="fas fa-ticket-alt"></i></div>
                    <div>
                        <div class="stat-val">24</div>
                        <div class="stat-label">Open Tickets</div>
                    </div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">Global Print Orders</div><i class="fas fa-ellipsis-v"></i>
                    </div>
                    <div class="chart-wrapper"><canvas id="chart-orders"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">Revenue by Material</div><i class="fas fa-ellipsis-v"></i>
                    </div>
                    <div class="chart-wrapper"><canvas id="chart-revenue"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">Server Workload</div><i class="fas fa-ellipsis-v"></i>
                    </div>
                    <div class="chart-wrapper"><canvas id="chart-load"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">User Demographics</div><i class="fas fa-ellipsis-v"></i>
                    </div>
                    <div class="chart-wrapper"><canvas id="chart-geo"></canvas></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
        document.getElementById('overlay').onclick = toggleSidebar;

        function toggleTheme() {
            const html = document.documentElement;
            const theme = html.getAttribute('data-theme') || 'light';
            const newTheme = theme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        function toggleDir() {
            const html = document.documentElement;
            const dir = html.getAttribute('dir') || 'ltr';
            const newDir = dir === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', newDir);
            localStorage.setItem('dir', newDir);
        }

        // Load preferences
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        const savedDir = localStorage.getItem('dir');
        if (savedDir) {
            document.documentElement.setAttribute('dir', savedDir);
        }

        function initCharts() {
            if (typeof Chart === 'undefined') return;

            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = 'Inter';

            new Chart(document.getElementById('chart-orders'), {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Orders',
                        data: [42, 58, 48, 72, 98, 65, 84],
                        borderColor: '#f43f5e',
                        backgroundColor: 'rgba(244,63,94,0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            new Chart(document.getElementById('chart-revenue'), {
                type: 'doughnut',
                data: {
                    labels: ['Titanium', 'Carbon Fiber', 'Resin', 'Nylon'],
                    datasets: [{
                        data: [45, 25, 20, 10],
                        backgroundColor: ['#f43f5e', '#8b5cf6', '#06b6d4', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%' }
            });

            new Chart(document.getElementById('chart-load'), {
                type: 'bar',
                data: {
                    labels: ['Hub 1', 'Hub 2', 'Hub 3', 'Hub 4', 'Hub 5'],
                    datasets: [{
                        label: 'Load %',
                        data: [82, 65, 94, 42, 78],
                        backgroundColor: '#8b5cf6',
                        borderRadius: 8
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            new Chart(document.getElementById('chart-geo'), {
                type: 'polarArea',
                data: {
                    labels: ['Europe', 'Asia', 'Americas', 'Middle East'],
                    datasets: [{
                        data: [35, 30, 25, 10],
                        backgroundColor: ['#f43f5e', '#8b5cf6', '#06b6d4', '#f59e0b'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { r: { ticks: { display: false } } } }
            });
        }

        window.addEventListener('load', initCharts);
    </script>

</body>

</html>
